<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b1510;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            padding: 20px;
            position: relative;
        }

        .envelope {
            position: relative;
            width: 100%;
            max-width: 380px;
            height: 250px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.8s ease, opacity 1.2s ease 1.5s; 
        }

        .envelope-back, .envelope-front, .envelope-flap {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .envelope-back {
            background: radial-gradient(circle, #1a3c2b 0%, #11261c 100%);
            z-index: 1;
        }

        .letter-shadow {
            position: absolute;
            top: 4px;
            left: 5%;
            width: 90%;
            height: 94%;
            background: linear-gradient(99deg, #f8e0b2 , #f4cc76);
            border-radius: 4px;
            z-index: 2;
            opacity: 0.7;
            transform: scaleY(0.98);
            transition: opacity 2.5s ease 1s;
        }

        .invitation-card {
            position: absolute;
            width: 100%;
            max-width: 360px;
            height: 480px; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            z-index: -1; 
            opacity: 0;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1) 1.2s,
                        opacity 2.5s ease 2.2s,
                        z-index 0s linear 2.2s;
        }

        .invitation-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #bf953f; 
        }

        .envelope-front {
            background: radial-gradient(circle at center, #163526, #0e2017);
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
            z-index: 4;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .envelope-flap {
            background: radial-gradient(circle at top, #183a29, #10241b);
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            z-index: 5;
            transform-origin: top;
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        z-index 0s linear 0.6s;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        .gold-logo {
            position: absolute;
            top: 15%;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.6));
            transition: opacity 0.8s ease;
        }

        .text-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .fade-text {
            color: #f4ecc2;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(20px);
        }

        .envelope.open {
            opacity: 0; 
            pointer-events: none;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope.open .gold-logo {
            opacity: 0;
        }

        .envelope.open .letter-shadow {
            opacity: 0;
        }

        .container.active-card .invitation-card {
            opacity: 1;
            z-index: 10;
            transform: translate(-50%, -53%) scale(1);
        }

        .container.active-card .text-1 {
            animation: textReveal 2.2s ease forwards 2.5s;
        }
        .container.active-card .text-2 {
            animation: textReveal 2.2s ease forwards 3.8s;
        }
        .container.active-card .text-3 {
            animation: textReveal 2.2s ease forwards 5.1s;
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        
        <div class="envelope" id="envelope">
            <div class="envelope-back"></div>
            <div class="letter-shadow"></div>
            <div class="envelope-flap" id="flap">
                <div class="gold-logo">L&F</div>
            </div>
            <div class="envelope-front"></div>
        </div>

        <div class="invitation-card">
           <img src="invitation_photo.png" alt="Invitation Card">
            <div class="text-container">
                <div class="fade-text text-1">Вы приглашены</div>
                <div class="fade-text text-2">На закрытое мероприятие</div>
                <div class="fade-text text-3">Мы ждем именно вас</div>
            </div>
        </div>

   
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelope = document.getElementById('envelope');
            const mainContainer = document.getElementById('mainContainer');
            const audio = new Audio('muzykalnaya-shkatulka.mp3')
            
            envelope.addEventListener('click', () => {
            audio.play().catch(() => { console.log("Music interaction required"); });

                if(!envelope.classList.contains('open')){
                    envelope.classList.add('open');
                    mainContainer.classList.add('active-card');
                }
            });
        });
    </script>
</body>
</html>
